name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build, test, and verify API surface
        run: ./gradlew build --stacktrace

      # Docs + sample run once (on 21) to avoid duplicate, host-JDK-independent work.
      - name: Generate docs and run the sample
        if: matrix.java == 21
        run: ./gradlew dokkaGenerate :sample:run --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: '**/build/reports/tests/'

  jvm11-runtime:
    name: JVM-11 runtime check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@v6

      # setup-java installs both and exports JAVA_HOME_11_X64 / JAVA_HOME_21_X64.
      # The LAST entry (21) becomes JAVA_HOME, so the Gradle 9.5.1 wrapper runs on 21
      # (it cannot run on 11); 11 is used only as the Test-task launcher.
      - name: Set up JDK 11 + 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            11
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Run only the JVM modules' tests on a JDK 11 launcher. fromEnv is a Gradle SYSTEM
      # property (-D), not a project property; it points toolchain discovery at the JDKs
      # setup-java installed (no foojay, no auto-download).
      - name: Run JVM-module tests on a JDK 11 launcher
        run: >-
          ./gradlew
          -PtestJvm=11
          -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_11_X64,JAVA_HOME_21_X64
          :aquifer-core:test :aquifer-test:test
          :aquifer-persistence-file:test :aquifer-okhttp:test
          --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-jvm11
          path: '**/build/reports/tests/'
