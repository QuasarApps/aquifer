name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify tag matches module versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          case "$TAG_VERSION" in
            *-SNAPSHOT) echo "Refusing to release a -SNAPSHOT version ($TAG_VERSION)"; exit 1 ;;
          esac
          for module in aquifer-core aquifer-persistence-file aquifer-android aquifer-compose aquifer-okhttp; do
            MODULE_VERSION=$(./gradlew -q ":$module:properties" | awk '/^version: /{print $2}')
            if [ "$MODULE_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag v$TAG_VERSION does not match :$module version $MODULE_VERSION."
              echo "Bump the module versions and CHANGELOG before tagging."
              exit 1
            fi
          done
          echo "Releasing version $TAG_VERSION"

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Publish
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
